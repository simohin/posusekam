apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "db-controller.fullname" . }}
  labels:
    {{- include "db-controller.selectorLabels" . | nindent 4 }}
spec:
  backoffLimit: 2
  template:
    metadata:
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: {{ .Values.vault.role | quote }}
        vault.hashicorp.com/agent-inject-secret-database: {{ .Values.vault.secretPath | quote }}
        vault.hashicorp.com/agent-inject-template-database: |
          {{`{{- with secret "`}}{{ .Values.vault.secretPath }}{{`" -}}`}}
          {{`url={{ .Data.data.url }}`}}
          {{`username={{ .Data.data.username }}`}}
          {{`password={{ .Data.data.password }}`}}
          {{`{{- end }}`}}
      labels:
        {{- include "db-controller.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "db-controller.serviceAccountName" . }}
      restartPolicy: Never
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: VAULT_SECRET_PATH
              value: "/vault/secrets/database"
