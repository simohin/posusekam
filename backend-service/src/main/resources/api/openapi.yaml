openapi: 3.0.3
info:
  title: Backend Service API
  description: API для управления Домохозяйствами и Магазинами в приложении По сусекам
  version: 1.0.0
paths:
  /v1/households:
    get:
      tags:
        - Households
      summary: Получить список домовладений пользователя
      operationId: listHouseholds
      responses:
        '200':
          description: Список домовладений
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HouseholdDto'
    post:
      tags:
        - Households
      summary: Создать новое домовладение
      operationId: createHousehold
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateHouseholdRequest'
      responses:
        '200':
          description: Домохозяйство создано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HouseholdDto'

  /v1/households/{id}:
    put:
      tags:
        - Households
      summary: Обновить название домовладения
      operationId: updateHousehold
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateHouseholdRequest'
      responses:
        '200':
          description: Домохозяйство обновлено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HouseholdDto'
    delete:
      tags:
        - Households
      summary: Удалить домовладение
      operationId: deleteHousehold
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Домохозяйство удалено

  /v1/{householdId}/stores:
    get:
      tags:
        - Stores
      summary: Получить список магазинов в домовладении
      operationId: listStores
      parameters:
        - name: householdId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Список магазинов
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StoreDto'
    post:
      tags:
        - Stores
      summary: Создать новый магазин в домовладении
      operationId: createStore
      parameters:
        - name: householdId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStoreRequest'
      responses:
        '200':
          description: Магазин создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreDto'

  /v1/{householdId}/stores/{id}:
    put:
      tags:
        - Stores
      summary: Обновить информацию о магазине
      operationId: updateStore
      parameters:
        - name: householdId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStoreRequest'
      responses:
        '200':
          description: Магазин обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreDto'
    delete:
      tags:
        - Stores
      summary: Удалить магазин
      operationId: deleteStore
      parameters:
        - name: householdId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Магазин удален

  /v1/metadata:
    get:
      tags:
        - Metadata
      summary: Получить метаданные приложения (иконки, настройки и т.д.)
      operationId: getMetadata
      responses:
        '200':
          description: Метаданные приложения
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppMetadataDto'

  /v1/settings:
    get:
      tags:
        - Settings
      summary: Получить настройки текущего пользователя
      operationId: getSettings
      responses:
        '200':
          description: Настройки пользователя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettingsDto'
    put:
      tags:
        - Settings
      summary: Полностью обновить настройки текущего пользователя
      operationId: updateSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSettingsRequest'
      responses:
        '200':
          description: Настройки обновлены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettingsDto'
    patch:
      tags:
        - Settings
      summary: Частично обновить настройки текущего пользователя
      operationId: patchSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Настройки частично обновлены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettingsDto'
    delete:
      tags:
        - Settings
      summary: Сбросить настройки текущего пользователя
      operationId: deleteSettings
      responses:
        '204':
          description: Настройки сброшены (удалены)

  /v1/user-info:
    get:
      tags:
        - UserInfo
      summary: Получить информацию о текущем пользователе
      operationId: getUserInfo
      responses:
        '200':
          description: Информация о пользователе
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfoDto'
    put:
      tags:
        - UserInfo
      summary: Полностью обновить информацию о текущем пользователе
      operationId: updateUserInfo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserInfoRequest'
      responses:
        '200':
          description: Информация обновлена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfoDto'
    patch:
      tags:
        - UserInfo
      summary: Частично обновить информацию о текущем пользователе
      operationId: patchUserInfo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Информация частично обновлена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfoDto'

  /v1/ai/generate-products:
    post:
      tags:
        - AI
      summary: Сгенерировать список продуктов с помощью ИИ
      operationId: generateProducts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateProductsRequest'
      responses:
        '200':
          description: Сгенерированный список продуктов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreProductsResponse'

components:
  schemas:
    HouseholdDto:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        icon:
          type: string
        createdAt:
          type: string
          format: date-time

    CreateHouseholdRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        icon:
          type: string

    UpdateHouseholdRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        icon:
          type: string

    StoreDto:
      type: object
      required:
        - id
        - name
        - householdId
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        householdId:
          type: string
          format: uuid
        icon:
          type: string
        color:
          type: string
        createdAt:
          type: string
          format: date-time

    CreateStoreRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        icon:
          type: string
        color:
          type: string

    UpdateStoreRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        icon:
          type: string
        color:
          type: string

    AppMetadataDto:
      type: object
      required:
        - icons
      properties:
        icons:
          type: array
          items:
            $ref: '#/components/schemas/IconMetadataDto'

    IconMetadataDto:
      type: object
      required:
        - name
        - displayName
        - type
        - category
        - keywords
      properties:
        name:
          type: string
        displayName:
          type: string
        type:
          type: string
        category:
          type: string
        keywords:
          type: string

    UserSettingsDto:
      type: object
      required:
        - userId
        - settings
      properties:
        userId:
          type: string
          format: uuid
        settings:
          type: object
          additionalProperties: true

    UpdateSettingsRequest:
      type: object
      required:
        - settings
      properties:
        settings:
          type: object
          additionalProperties: true

    UserInfoDto:
      type: object
      required:
        - userId
        - info
      properties:
        userId:
          type: string
          format: uuid
        info:
          type: object
          additionalProperties: true

    UpdateUserInfoRequest:
      type: object
      required:
        - info
      properties:
        info:
          type: object
          additionalProperties: true

    GenerateProductsRequest:
      type: object
      required:
        - storeDescription
      properties:
        storeDescription:
          type: string
        itemsCount:
          type: integer

    StoreProductsResponse:
      type: object
      required:
        - store_type
        - products
      properties:
        store_type:
          type: string
        products:
          type: array
          items:
            $ref: '#/components/schemas/AiProductResponse'

    AiProductResponse:
      type: object
      required:
        - name
        - measureUnit
        - category
        - description
      properties:
        name:
          type: string
        measureUnit:
          type: string
        category:
          type: string
        description:
          type: string


